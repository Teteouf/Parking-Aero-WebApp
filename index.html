<html>
  <head>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/zxing-compiler/0.0.1/zxing.min.js'></script>
  </head>
  <body>
    <input type='file' accept='image/*' onchange='scanFile(this.files[0])'>
    <div id='result'></div>

    <script>
      function scanFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const codeReader = new ZXing.BrowserQRCodeReader();
          codeReader.decodeFromImage(null, e.target.result)
            .then(result => {
              document.getElementById('result').innerText = result.text;
            })
            .catch(err => {
              console.error(err);
            });
        };
        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
